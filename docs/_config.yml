remote_theme: just-the-docs/just-the-docs

title: EzRTP
description: >-
  Production-focused random teleport plugin for Minecraft servers — safety-first
  teleportation, cross-platform compatibility, and configuration-driven control
  for server owners.

url: "https://ez-plugins.github.io"
baseurl: "/EzRTP"

# ── Appearance
────────────────────────────────────────────────────────────────
color_scheme: ezrtp
heading_anchors: true

# ── Header links
──────────────────────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/ez-plugins/EzRTP"
  "Modrinth":
    - "https://modrinth.com/plugin/ezplugins-ezrtp"
aux_links_new_tab: true

# ── Navigation
────────────────────────────────────────────────────────────────
nav_sort: case_insensitive
nav_external_links:
  - title: Changelog
    url: "https://github.com/ez-plugins/EzRTP/releases"
    hide_icon: false

# ── Search
────────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level:        2
  previews:             3
  preview_words_before: 5
  preview_words_after:  10
  tokenizer_separator: /[\s/]+/

# ── Footer
────────────────────────────────────────────────────────────────────
back_to_top:     true
back_to_top_text: "Back to top"

footer_content: >-
  Copyright &copy; 2024&ndash;2026 Gyvex.
  Distributed under the
  <a href="https://github.com/ez-plugins/EzRTP/blob/main/LICENSE">MIT License</a>.

# ── Kramdown
──────────────────────────────────────────────────────────────────
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ── Plugins
───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# ── Build exclusions
──────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
