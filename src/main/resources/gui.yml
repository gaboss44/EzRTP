# EzRTP GUI configuration
#
# Toggle and customise the optional world selection inventory.
#
# PlaceholderAPI Support:
# You can use PlaceholderAPI placeholders in icon names and lores!
# Examples: %player_name%, %player_level%, %player_health%, etc.
# See gui-placeholders-example.yml for detailed examples.
# Requires PlaceholderAPI plugin to be installed.
enabled: true
title: "<dark_aqua><bold>Random Teleport</bold></dark_aqua>"
rows: 5
no-permission-message: "<red>You do not have permission to travel there.</red>"
# Optional custom messages for GUI (fallback to defaults if not specified)
cache-filter-info: "<yellow>Only showing options with cached RTP locations available.</yellow>"
no-destinations: "<red>No teleport destinations are currently available.</red>"
# Cache filtering configuration
disable-cache-filtering: false  # Set to true to show all worlds regardless of cache status
admin-only-cache-info: false    # Set to true to only show cache info messages to admins
# Rare biomes configuration - applies special cache requirements to rare biomes
# Rare biomes are defined in config.yml under biomes.rare-biome-optimization.rare-biomes
rare_biomes:
  enabled: true  # Enable special cache filtering for rare biomes
  # You can optionally add additional rare biomes here (in addition to those in config.yml):
  # list:
  #   - CHERRY_GROVE
  #   - DEEP_DARK
  # You can override the default minimum cache requirement here:
  require-cache:
    minimum-cached: 1  # Minimum number of cached locations required for rare biomes
filler:
  enabled: true
  material: GLASS_PANE
  name: "<dark_gray> </dark_gray>"
worlds:
  overworld:
    # Slot within the GUI (0-53). When omitted entries are placed in order.
    slot: 22
    # Optional permission required to choose this world.
    permission: ""
    icon:
      material: GRASS
      name: "<green><bold>Overworld</bold></green>"
      lore:
        - "<gray>Balanced biomes, safe landings, and</gray>"
        - "<gray>plenty of room to explore.</gray>"
        - "<dark_gray>Click to begin your adventure.</dark_gray>"
    settings:
      world: world
  nether:
    slot: 20
    permission: "ezrtp.gui.nether"
    icon:
      material: NETHERRACK
      name: "<red><bold>Nether</bold></red>"
      lore:
        - "<gray>Warp into the Nether to hunt</gray>"
        - "<gray>for ancient debris and rare loot.</gray>"
        - "<dark_gray>Requires Nether access.</dark_gray>"
    settings:
      world: world_nether
  end:
    slot: 24
    permission: "ezrtp.gui.end"
    icon:
      material: END_STONE
      name: "<light_purple><bold>The End</bold></light_purple>"
      lore:
        - "<gray>Teleport to distant End islands</gray>"
        - "<gray>for chorus fruit and gateways.</gray>"
        - "<dark_gray>Requires End access.</dark_gray>"
    settings:
      world: world_the_end
